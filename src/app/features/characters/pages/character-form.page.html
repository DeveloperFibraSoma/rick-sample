<app-page-header
  eyebrow="CRUD"
  title="Character form"
  description="Create and edit use the same reactive form for consistency."
></app-page-header>

@if (store.detailLoading()) {
  <app-loading-state message="Loading character..." />
} @else {
  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid">
      <label>
        <span>Name</span>
        <input type="text" formControlName="name" />
      </label>

      <label>
        <span>Status</span>
        <select formControlName="status">
          @for (status of statuses; track status) {
            <option [value]="status">{{ status }}</option>
          }
        </select>
      </label>

      <label>
        <span>Species</span>
        <input type="text" formControlName="species" />
      </label>

      <label>
        <span>Type</span>
        <input type="text" formControlName="type" />
      </label>

      <label>
        <span>Gender</span>
        <select formControlName="gender">
          @for (gender of genders; track gender) {
            <option [value]="gender">{{ gender }}</option>
          }
        </select>
      </label>

      <label>
        <span>Origin</span>
        <input type="text" formControlName="originName" />
      </label>

      <label>
        <span>Location</span>
        <input type="text" formControlName="locationName" />
      </label>

      <label>
        <span>Image URL</span>
        <input type="url" formControlName="image" />
      </label>
    </div>

    @if (form.errors?.['saveFailed']) {
      <p class="error">The record could not be saved.</p>
    }

    <div class="actions">
      <a routerLink="/characters">Cancel</a>
      <button type="submit">{{ id() ? 'Update character' : 'Create character' }}</button>
    </div>
  </form>
}
